services:
  client-view:
    container_name: client-view
    build:
      context: .
      dockerfile: Dockerfile
    image: booking/client-view:v0.1
    ports:
      - "${PORT}:3000"
    env_file:
      - ./.env
    restart: unless-stopped
    networks:
      - server

networks:
  server:
    driver: bridge
